<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XynthraVPN</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0b1e;
      --bg-gradient: #12132e;
      --card: #1a1b3a;
      --card-light: #252650;
      --primary: #7c3aed;
      --primary-light: #9f67ff;
      --accent: #06d6a0;
      --accent-dark: #05b888;
      --text: #ffffff;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      --disconnected: #4b5563;
      --connecting: #f59e0b;
      --connected: #06d6a0;
      --error: #ef4444;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, var(--bg-gradient) 0%, var(--bg) 100%);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    .titlebar {
      -webkit-app-region: drag;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 8px;
      background: transparent;
    }

    .titlebar-btn {
      -webkit-app-region: no-drag;
      width: 32px;
      height: 24px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .titlebar-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }
    .titlebar-btn.close:hover { background: var(--error); color: white; }

    .app {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 32px);
      padding: 0 24px 24px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 0 16px;
      position: relative;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .logo-text span { color: var(--primary-light); }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--disconnected);
      transition: all 0.3s;
    }

    .status-dot.connected { background: var(--connected); box-shadow: 0 0 12px rgba(6,214,160,0.5); }
    .status-dot.connecting { background: var(--connecting); box-shadow: 0 0 12px rgba(245,158,11,0.5); animation: pulse-dot 1.5s infinite; }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text {
      font-size: 18px;
      font-weight: 600;
      color: var(--disconnected);
      transition: color 0.3s;
    }

    .status-text.connected { color: var(--connected); }
    .status-text.connecting { color: var(--connecting); }

    .connect-btn {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      border: 2px solid rgba(75,85,99,0.3);
      background: linear-gradient(135deg, var(--card-light), var(--card));
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.4s ease;
      position: relative;
    }

    .connect-btn::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: transparent;
      transition: all 0.4s;
    }

    .connect-btn:hover { transform: scale(1.03); }
    .connect-btn:active { transform: scale(0.97); }

    .connect-btn.connected {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      border-color: rgba(6,214,160,0.3);
      box-shadow: 0 0 40px rgba(6,214,160,0.3), 0 0 80px rgba(6,214,160,0.1);
      animation: pulse-btn 2s ease-in-out infinite;
    }

    .connect-btn.connecting {
      background: linear-gradient(135deg, var(--connecting), #d97706);
      border-color: rgba(245,158,11,0.3);
      box-shadow: 0 0 40px rgba(245,158,11,0.3);
    }

    @keyframes pulse-btn {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .connect-btn .icon {
      font-size: 52px;
      line-height: 1;
    }

    .connect-btn .label {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .spinner {
      width: 52px;
      height: 52px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .duration {
      font-size: 32px;
      font-weight: 300;
      letter-spacing: 4px;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      min-height: 40px;
    }

    .tap-hint {
      font-size: 14px;
      color: var(--text-muted);
      min-height: 20px;
    }

    .error-text {
      font-size: 12px;
      color: var(--error);
      text-align: center;
      max-width: 280px;
      min-height: 20px;
    }

    .server-card {
      width: 100%;
      max-width: 340px;
      padding: 16px 20px;
      background: rgba(26,27,58,0.7);
      border: 1px solid rgba(37,38,80,0.5);
      border-radius: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .server-card:hover { background: rgba(26,27,58,0.9); border-color: var(--primary); }

    .flag {
      width: 40px;
      height: 28px;
      background: rgba(124,58,237,0.2);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
      color: var(--primary);
      flex-shrink: 0;
    }

    .server-info { flex: 1; }
    .server-name { font-weight: 600; font-size: 15px; }
    .server-ip { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

    .ping-badge {
      padding: 4px 10px;
      background: rgba(6,214,160,0.1);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
    }

    .chevron {
      color: var(--text-muted);
      font-size: 18px;
    }

    .stats-row {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 340px;
    }

    .stat-card {
      flex: 1;
      padding: 14px;
      background: rgba(26,27,58,0.7);
      border: 1px solid rgba(37,38,80,0.5);
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .stat-icon { font-size: 18px; }
    .stat-value { font-weight: 600; font-size: 14px; color: var(--text); }
    .stat-label { font-size: 12px; color: var(--text-muted); }

    /* Server List Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.active { display: flex; align-items: center; justify-content: center; }

    .modal {
      background: var(--bg);
      border: 1px solid var(--card-light);
      border-radius: 20px;
      width: 360px;
      max-height: 500px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      padding: 20px 24px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title { font-size: 18px; font-weight: 700; }

    .modal-close {
      width: 32px;
      height: 32px;
      border: none;
      background: var(--card);
      color: var(--text-secondary);
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .modal-close:hover { background: var(--card-light); color: var(--text); }

    .server-list {
      padding: 0 16px 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .server-item {
      padding: 14px 16px;
      background: var(--card);
      border: 1px solid transparent;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .server-item:hover { border-color: var(--primary); background: var(--card-light); }
    .server-item.selected { border-color: var(--accent); background: rgba(6,214,160,0.08); }

    .server-item .flag {
      width: 36px;
      height: 24px;
      font-size: 11px;
    }

    .server-item .info { flex: 1; }
    .server-item .name { font-weight: 600; font-size: 14px; }
    .server-item .ip { font-size: 12px; color: var(--text-muted); }

    .server-item .check {
      color: var(--accent);
      font-size: 18px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .server-item.selected .check { opacity: 1; }

    /* Setup banner */
    .setup-banner {
      display: none;
      padding: 14px 16px;
      margin: 0 0 12px;
      background: rgba(124,58,237,0.1);
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 12px;
      font-size: 13px;
      color: var(--text-secondary);
      text-align: center;
      line-height: 1.4;
    }

    .setup-banner.active { display: block; }

    .setup-btn {
      margin-top: 8px;
      padding: 8px 20px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--primary), #5b21b6);
      color: white;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .setup-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(124,58,237,0.3); }
    .setup-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="titlebar">
    <button class="titlebar-btn" onclick="vpnAPI.minimize()">&#x2013;</button>
    <button class="titlebar-btn close" onclick="vpnAPI.close()">&#x2715;</button>
  </div>

  <div class="app">
    <div class="header">
      <div class="logo-text">Xynthra<span>VPN</span></div>
    </div>

    <div id="setup-banner" class="setup-banner">
      <div id="setup-text">First-time setup required for secure VPN connection.</div>
      <button id="setup-btn" class="setup-btn" onclick="runSetup()">Setup Now</button>
    </div>

    <div class="main">
      <div class="status-row">
        <div id="status-dot" class="status-dot"></div>
        <div id="status-text" class="status-text">Disconnected</div>
      </div>

      <button id="connect-btn" class="connect-btn" onclick="toggleConnection()">
        <div id="btn-icon" class="icon">&#x1F6E1;</div>
        <div id="btn-label" class="label">OFF</div>
      </button>

      <div id="duration" class="duration"></div>
      <div id="tap-hint" class="tap-hint">Click to connect</div>
      <div id="error-text" class="error-text"></div>

      <div id="server-card" class="server-card" onclick="openServerList()">
        <div class="flag">NL</div>
        <div class="server-info">
          <div id="selected-name" class="server-name">Netherlands #1</div>
          <div id="selected-ip" class="server-ip">85.17.***.167</div>
        </div>
        <div class="ping-badge" id="selected-ping">--ms</div>
        <div class="chevron">&#x203A;</div>
      </div>

      <div id="stats-row" class="stats-row" style="display:none;">
        <div class="stat-card">
          <div class="stat-icon" style="color:var(--primary);">&#x2191;</div>
          <div class="stat-value" id="stat-up">0 B</div>
          <div class="stat-label">Upload</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="color:var(--accent);">&#x2193;</div>
          <div class="stat-value" id="stat-down">0 B</div>
          <div class="stat-label">Download</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Server List Modal -->
  <div id="server-modal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Select Server</div>
        <button class="modal-close" onclick="closeServerList()">&#x2715;</button>
      </div>
      <div id="server-list" class="server-list"></div>
    </div>
  </div>

  <script>
    const servers = [
      {
        id: 'nl-ams-1', name: 'Netherlands #1', ip: '85.17.244.167', country: 'NL',
        config: `[Interface]\nPrivateKey = IH9ODtFAJQAZM1slAC6G96PnOmDJpTI1oi5yPScqgFk=\nAddress = 10.8.0.2/24\nDNS = 1.1.1.1, 8.8.8.8\n\n[Peer]\nPublicKey = 6XTcbaZWaSbDzX659OpXiSV4t8oUPXVLFCsaw1txYz8=\nPresharedKey = 7V37Vn4DCF4faYSjDaERZ/bb9azkCvtUMUeTXNbHqu8=\nAllowedIPs = 0.0.0.0/0, ::/0\nPersistentKeepalive = 25\nEndpoint = 85.17.244.167:51820`
      },
      {
        id: 'nl-ams-2', name: 'Netherlands #2', ip: '94.75.223.85', country: 'NL',
        config: `[Interface]\nPrivateKey = WL0kr1ZgjGUZeZjJ1aDPjqPZPIho9m2O+gmiR5EfkG0=\nAddress = 10.8.0.2/24\nDNS = 1.1.1.1, 8.8.8.8\n\n[Peer]\nPublicKey = /6/0pLiMd+JiWFShKX0t1WVLKMx1V4kgVget+3B5/wE=\nPresharedKey = +LDAIUxEhsc3JiFQ5IgXocXmnV/2avB19EMLkdsi+Yc=\nAllowedIPs = 0.0.0.0/0, ::/0\nPersistentKeepalive = 25\nEndpoint = 94.75.223.85:51820`
      },
      {
        id: 'nl-ams-3', name: 'Netherlands #3', ip: '95.211.164.41', country: 'NL',
        config: `[Interface]\nPrivateKey = sOYU0ROL2X0N0Bfbd9mEyvfl0rIIcgnbxNv1FucjyFs=\nAddress = 10.8.0.2/24\nDNS = 1.1.1.1, 8.8.8.8\n\n[Peer]\nPublicKey = Fo1iJHjrHAGf9acieZpTcoJDqUqdmefe4S7Bw+QT4Go=\nAllowedIPs = 0.0.0.0/0, ::/0\nPersistentKeepalive = 25\nEndpoint = 95.211.164.41:51820`
      },
      {
        id: 'nl-ams-4', name: 'Netherlands #4', ip: '85.17.192.6', country: 'NL',
        config: `[Interface]\nPrivateKey = UI+Bm1v6IkBMetps+EyGz4Uz5y54Mt7Z6GEUEdpWymU=\nAddress = 10.8.0.2/24\nDNS = 1.1.1.1, 8.8.8.8\n\n[Peer]\nPublicKey = qwKplYnxZB+PN9e0iYRjRthp7zVELbXbgLhTLW8rxgM=\nAllowedIPs = 0.0.0.0/0, ::/0\nPersistentKeepalive = 25\nEndpoint = 85.17.192.6:51820`
      },
      {
        id: 'nl-ams-5', name: 'Netherlands #5', ip: '85.17.67.240', country: 'NL',
        config: `[Interface]\nPrivateKey = cF7L8VAnDWGWYzBBES9GhQ7S6KzImVaALyeeL4kHrUo=\nAddress = 10.8.0.2/24\nDNS = 1.1.1.1, 8.8.8.8\n\n[Peer]\nPublicKey = ydGDlmYo1fD2q9ILP0+krA5RKszKBUzQz9hGcsW0HAA=\nAllowedIPs = 0.0.0.0/0, ::/0\nPersistentKeepalive = 25\nEndpoint = 85.17.67.240:51820`
      },
      {
        id: 'nl-ams-6', name: 'Netherlands #6', ip: '85.17.67.239', country: 'NL',
        config: `[Interface]\nPrivateKey = qP0aSC9Gfy5wh6b002uChwmJu52ADlhBviREspd5O0o=\nAddress = 10.8.0.2/24\nDNS = 1.1.1.1, 8.8.8.8\n\n[Peer]\nPublicKey = I3Jjrw4/5ZBTTRPFswVyHK9hUXktZ7XClV6X7YIhjmc=\nAllowedIPs = 0.0.0.0/0, ::/0\nPersistentKeepalive = 25\nEndpoint = 85.17.67.239:51820`
      }
    ];

    let selectedServer = servers[0];
    let connectionState = 'disconnected'; // disconnected, connecting, connected, disconnecting
    let connectedSince = null;
    let durationInterval = null;

    function maskIp(ip) {
      const p = ip.split('.');
      return `${p[0]}.${p[1]}.***.${p[3]}`;
    }

    function updateUI() {
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      const btn = document.getElementById('connect-btn');
      const icon = document.getElementById('btn-icon');
      const label = document.getElementById('btn-label');
      const duration = document.getElementById('duration');
      const hint = document.getElementById('tap-hint');
      const stats = document.getElementById('stats-row');

      dot.className = 'status-dot ' + (connectionState === 'connected' ? 'connected' : connectionState === 'connecting' ? 'connecting' : '');
      text.className = 'status-text ' + (connectionState === 'connected' ? 'connected' : connectionState === 'connecting' ? 'connecting' : '');

      const stateLabels = { disconnected: 'Disconnected', connecting: 'Connecting...', connected: 'Connected', disconnecting: 'Disconnecting...' };
      text.textContent = stateLabels[connectionState];

      btn.className = 'connect-btn ' + connectionState;

      if (connectionState === 'connecting' || connectionState === 'disconnecting') {
        icon.innerHTML = '<div class="spinner"></div>';
        label.textContent = '';
      } else if (connectionState === 'connected') {
        icon.innerHTML = '&#x1F6E1;';
        label.textContent = 'ON';
      } else {
        icon.innerHTML = '&#x23FB;';
        label.textContent = 'OFF';
      }

      hint.textContent = connectionState === 'disconnected' ? 'Click to connect' : '';
      stats.style.display = connectionState === 'connected' ? 'flex' : 'none';

      document.getElementById('selected-name').textContent = selectedServer.name;
      document.getElementById('selected-ip').textContent = maskIp(selectedServer.ip);
    }

    function updateDuration() {
      if (!connectedSince) {
        document.getElementById('duration').textContent = '';
        return;
      }
      const diff = Math.floor((Date.now() - connectedSince) / 1000);
      const h = String(Math.floor(diff / 3600)).padStart(2, '0');
      const m = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
      const s = String(diff % 60).padStart(2, '0');
      document.getElementById('duration').textContent = `${h}:${m}:${s}`;
    }

    async function toggleConnection() {
      if (connectionState === 'connecting' || connectionState === 'disconnecting') return;

      document.getElementById('error-text').textContent = '';

      if (needsSetup && connectionState !== 'connected') {
        await runSetup();
        if (needsSetup) return;
      }

      if (connectionState === 'connected') {
        connectionState = 'disconnecting';
        updateUI();
        const result = await vpnAPI.disconnect(selectedServer.id);
        if (result.success) {
          connectionState = 'disconnected';
          connectedSince = null;
          clearInterval(durationInterval);
          durationInterval = null;
        } else {
          connectionState = 'connected';
          document.getElementById('error-text').textContent = result.error || 'Disconnect failed';
        }
      } else {
        connectionState = 'connecting';
        updateUI();
        const result = await vpnAPI.connect(selectedServer.id, selectedServer.config);
        if (result.success) {
          connectionState = 'connected';
          connectedSince = Date.now();
          durationInterval = setInterval(updateDuration, 1000);
        } else {
          connectionState = 'disconnected';
          document.getElementById('error-text').textContent = result.error || 'Connection failed';
        }
      }
      updateUI();
    }

    function openServerList() {
      const list = document.getElementById('server-list');
      list.innerHTML = '';
      servers.forEach(s => {
        const item = document.createElement('div');
        item.className = 'server-item' + (s.id === selectedServer.id ? ' selected' : '');
        item.innerHTML = `
          <div class="flag">${s.country}</div>
          <div class="info">
            <div class="name">${s.name}</div>
            <div class="ip">${maskIp(s.ip)}</div>
          </div>
          <div class="check">&#x2713;</div>
        `;
        item.onclick = () => {
          if (connectionState !== 'connected') {
            selectedServer = s;
            updateUI();
          }
          closeServerList();
        };
        list.appendChild(item);
      });
      document.getElementById('server-modal').classList.add('active');
    }

    function closeServerList() {
      document.getElementById('server-modal').classList.remove('active');
    }

    document.getElementById('server-modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('server-modal')) closeServerList();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeServerList();
    });

    let needsSetup = false;

    async function runSetup() {
      const btn = document.getElementById('setup-btn');
      const text = document.getElementById('setup-text');
      btn.disabled = true;
      btn.textContent = 'Setting up...';
      text.textContent = 'Installing secure tunnel components... This may take a moment.';

      const result = await vpnAPI.setupWireGuard();
      if (result.installed) {
        needsSetup = false;
        document.getElementById('setup-banner').classList.remove('active');
        text.textContent = 'Setup complete!';
      } else {
        text.textContent = result.error || 'Setup failed. Please try again.';
        btn.disabled = false;
        btn.textContent = 'Retry Setup';
      }
    }

    async function init() {
      const wg = await vpnAPI.checkWireGuard();
      if (!wg.installed) {
        needsSetup = true;
        document.getElementById('setup-banner').classList.add('active');
      }
      updateUI();
    }

    init();
  </script>
</body>
</html>
